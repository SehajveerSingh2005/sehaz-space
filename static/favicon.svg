<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="floor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="wallL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16162a"/>
      <stop offset="100%" stop-color="#1e1e38"/>
    </linearGradient>
    <linearGradient id="wallR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#12122a"/>
      <stop offset="100%" stop-color="#0e0e20"/>
    </linearGradient>
  </defs>

  <!-- Left wall -->
  <polygon points="50,18 12,40 12,72 50,50" fill="url(#wallL)"/>
  <!-- Right wall -->
  <polygon points="50,18 88,40 88,72 50,50" fill="url(#wallR)"/>
  <!-- Floor -->
  <polygon points="12,72 50,50 88,72 50,94" fill="url(#floor)"/>

  <!-- Wall edge highlights -->
  <line x1="50" y1="18" x2="50" y2="50" stroke="#9d4edd" stroke-width="1" opacity="0.4"/>
  <line x1="12" y1="72" x2="50" y2="94" stroke="#9d4edd" stroke-width="0.8" opacity="0.2"/>
  <line x1="88" y1="72" x2="50" y2="94" stroke="#9d4edd" stroke-width="0.8" opacity="0.2"/>

  <!-- Small desk on left wall -->
  <rect x="20" y="48" width="16" height="10" rx="1" fill="#2a1a3a" opacity="0.8"/>
  <rect x="22" y="50" width="5" height="3" rx="0.5" fill="#9d4edd" opacity="0.5"/>

  <!-- Small window on right wall -->
  <rect x="60" y="30" width="14" height="16" rx="1" fill="none" stroke="#9d4edd" stroke-width="1" opacity="0.35"/>
  <line x1="67" y1="30" x2="67" y2="46" stroke="#9d4edd" stroke-width="0.6" opacity="0.25"/>
  <line x1="60" y1="38" x2="74" y2="38" stroke="#9d4edd" stroke-width="0.6" opacity="0.25"/>

  <!-- Tiny glowing dot (lamp/accent) -->
  <circle cx="36" cy="46" r="2" fill="#9d4edd" opacity="0.6"/>
  <circle cx="36" cy="46" r="4" fill="#9d4edd" opacity="0.15"/>
</svg>